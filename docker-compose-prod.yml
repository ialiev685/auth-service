services:
  app:
    build:
      context: .
    restart: unless-stopped
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    env_file:
      - ./.env.prod
    depends_on:
      - db
    networks:
      - app-network
    command: ["yarn", "start"]

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
