services:
  app:
    container_name: auth-app
    build:
      context: .
    restart: unless-stopped
    volumes:
      - ./src:/app/src
    ports:
      - '${PORT}:${PORT}'
    env_file:
      - ./.env.dev
    depends_on:
      - db
    networks:
      - app-network
    command: ['yarn', 'dev:docker']

  db:
    container_name: auth-db
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5433:${DB_PORT}'
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
